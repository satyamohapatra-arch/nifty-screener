name: Daily Nifty Screener

on:
  schedule:
    # 10:01 UTC = 15:31 IST every weekday
    - cron: '1 10 * * 1-5'
  workflow_dispatch:  # manual trigger from GitHub UI

jobs:
  run-screener:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Restore master data cache
        uses: actions/cache@v4
        with:
          path: |
            master_data_NIFTY100.csv
            master_data_NIFTY_LARGEMIDCAP250.csv
          key: master-data-${{ runner.os }}-${{ hashFiles('screener.py') }}
          restore-keys: |
            master-data-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run screener
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python screener.py 2>&1 | tee screener_log.txt

      - name: Upload log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screener-log-${{ github.run_number }}
          path: screener_log.txt
          retention-days: 7
